version: "3.9"
services:
  jarvis:
    build: .
    image: jarvis-core:latest
    env_file:
      - .env
    environment:
      - API_TOKEN=${API_TOKEN:-changeme-token}
      - OPENAI_API_KEY
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    restart: unless-stopped
volumes:
  jarvis_data:
