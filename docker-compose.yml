version: '3.9'
services:
  jarvis:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./:/app
      - jarvis_data:/workspace/data
volumes:
  jarvis_data:
